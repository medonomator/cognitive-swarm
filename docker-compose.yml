services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognitive-swarm-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:6333/healthz']
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  qdrant-data:
